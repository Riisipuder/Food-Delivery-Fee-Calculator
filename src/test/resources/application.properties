spring.application.name=food-delivery-fee-calculator
spring.datasource.url=jdbc:h2:mem:testdb-${random.uuid};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.serialization.indent_output=true
spring.sql.init.mode=always
spring.task.scheduling.enabled=false
application.display-name=Food Delivery Fee Calculator API
weather.api.observations-url=https://www.ilmateenistus.ee/ilma_andmed/xml/observations.php
weather.import.cron=0 15 * * * *
